#import secrets file with db credentials and env urls
spring:
  config:
    import: 'optional:classpath:application-secrets.yml'

info:
  app:
    name: '@info.app.name@'
    version: '@info.app.version@'
    grailsVersion: '@info.app.grailsVersion@'
grails:
  codegen:
    defaultPackage: groovybones
  profile: web
  mime:
    disable:
      accept:
        header:
          userAgents:
          - Gecko
          - WebKit
          - Presto
          - Trident
    types:
      all: '*/*'
      atom: application/atom+xml
      css: text/css
      csv: text/csv
      form: application/x-www-form-urlencoded
      html:
      - text/html
      - application/xhtml+xml
      js: text/javascript
      json:
      - application/json
      - text/json
      multipartForm: multipart/form-data
      pdf: application/pdf
      rss: application/rss+xml
      text: text/plain
      hal:
      - application/hal+json
      - application/hal+xml
      xml:
      - text/xml
      - application/xml
  views:
    gsp:
      encoding: UTF-8
      htmlcodec: xml
      codecs:
        expression: html
        scriptlet: html
        taglib: none
        staticparts: none
    default:
      codec: html


aws:
  region: us-east-2
  cognito:
    userPoolId: ${USER_POOL_ID}
    clientId: ${CLIENT_ID}
    clientSecret: ${CLIENT_SECRET}
    domain: https://us-east-2fysv9qug6.auth.us-east-2.amazoncognito.com
    loginUI: https://us-east-2fysv9qug6.auth.us-east-2.amazoncognito.com/login?client_id=1kvgptqf96h52ibammt9t04sj&redirect_uri=http://localhost:8080/login/callback&response_type=code&scope=email+openid+phone
    logoutUI: https://us-east-2fysv9qug6.auth.us-east-2.amazoncognito.com/logout?client_id=1kvgptqf96h52ibammt9t04sj&logout_uri=http://localhost:8080/
  credentials:
    accessKey: ${ACCESS_KEY}
    secretKey: ${SECRET_KEY}


apiKey:
  secretkey: ${API_KEY}


#DB credentials/drivers are configured here - dataSource db credential variables exported to secrets file
dataSource:
  driverClassName: com.mysql.cj.jdbc.Driver
  pooled: true
  jmxExport: true
  dialect: org.hibernate.dialect.MySQL8Dialect

environments:
  development:
    dataSource:
      dbCreate: none

  test:
    dataSource:
      url: 'jdbc:mysql://localhost:3306/groovy_test'
      dbCreate: none


  production:
    dataSource:
      dbCreate: none
      url: ${DB_URL_PRD}
      username: ${DB_USERNAME_PRD}
      password: ${DB_PASSWORD_PRD}
      properties:
        jmxEnabled: true
        initialSize: 5
        maxActive: 50
        minIdle: 5
        maxIdle: 25
        maxWait: 10000
        maxAge: 600000
        timeBetweenEvictionRunsMillis: 5000
        minEvictableIdleTimeMillis: 60000
        validationQuery: SELECT 1
        validationQueryTimeout: 3
        validationInterval: 15000
        testOnBorrow: true
        testWhileIdle: true
        testOnReturn: false
        jdbcInterceptors: ConnectionState
        defaultTransactionIsolation: 2
hibernate:
  cache:
    queries: false
    use_second_level_cache: false
    use_query_cache: false